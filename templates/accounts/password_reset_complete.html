{% load static %}
<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Password Updated - Fosua Guesthouse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/brand.css' %}?v=20260624-darkcards" rel="stylesheet">
  </head>
  <body>
    <main class="container py-5">
      <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-md-6 col-lg-5">
          <div class="module-shell">
            <section class="module-hero">
              <div class="module-hero-copy text-center">
                <img src="{% static 'branding/fosua-logo.jpg' %}" alt="Fosua Guesthouse logo" class="brand-wordmark mb-3">
                <div class="module-kicker">Done</div>
                <h1 class="module-title">Password updated</h1>
                <p class="module-subcopy mx-auto">You can now sign in with your new password.</p>
              </div>
            </section>
            <section class="module-card">
              <div class="module-card-body p-4 p-lg-5 text-center">
                <a class="btn btn-primary w-100" href="{% url 'login' %}">Go to login</a>
              </div>
            </section>
            </div>
        </div>
      </div>
    </main>
  </body>
</html>
