{% load static %}
<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fosua Guesthouse Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/brand.css' %}?v=20260624-darkcards" rel="stylesheet">
  </head>
  <body>
    <main class="container py-5">
      <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-md-6 col-lg-5">
          <div class="module-shell">
            <section class="module-hero">
              <div class="module-hero-copy text-center">
                <img src="{% static 'branding/fosua-logo.jpg' %}" alt="Fosua Guesthouse logo" class="brand-wordmark mb-3">
                <div class="module-kicker">Secure login</div>
                <h1 class="module-title">Staff Login</h1>
                <p class="module-subcopy mx-auto">Sign in with your staff credentials to access hotel operations and guest service tools.</p>
              </div>
            </section>
            <section class="module-card">
              <div class="module-card-body p-4 p-lg-5">
              <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                  <label class="form-label" for="id_username">Username</label>
                  <input class="form-control" type="text" name="username" id="id_username" required autofocus>
                </div>
                <div class="mb-3">
                  <label class="form-label" for="id_password">Password</label>
                  <input class="form-control" type="password" name="password" id="id_password" required>
                </div>
              {% if form.errors %}
                  <div class="alert alert-danger">Invalid username or password.</div>
                {% endif %}
                <button type="submit" class="btn btn-primary w-100">Login</button>
                <input type="hidden" name="next" value="{{ next }}">
              </form>
              <div class="d-flex justify-content-between align-items-center mt-3 small">
                <a href="{% url 'password_reset' %}" class="text-decoration-none">Forgot password?</a>
              </div>
              </div>
            </section>
            </div>
        </div>
      </div>
    </main>
  </body>
</html>
