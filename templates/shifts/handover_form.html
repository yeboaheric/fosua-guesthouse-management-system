{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="h4 mb-0">{{ title }}</h1>
      <a class="btn btn-outline-secondary" href="{% url 'handover-list' %}">Back</a>
    </div>
    <div class="card shadow-sm">
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          {{ form.non_field_errors }}
          {% for field in form %}
            <div class="mb-3">
              <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
              {{ field }}
              {% if field.errors %}
                <div class="text-danger small mt-1">{{ field.errors|join:", " }}</div>
              {% endif %}
            </div>
          {% endfor %}
          <button class="btn btn-primary" type="submit">Create Handover Report</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
