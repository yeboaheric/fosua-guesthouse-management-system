{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="brand-panel p-4 mb-3 d-flex justify-content-between align-items-center">
  <div>
    <h1 class="h4 mb-1">Admin Dashboard</h1>
    <div class="brand-badge">Fosua Guesthouse - Aduman</div>
  </div>
  <img src="{% static 'branding/fosua-logo.jpg' %}" alt="Fosua Guesthouse logo" class="brand-mark">
</div>
<div class="dashboard-background p-4 rounded-4">
  <div class="row g-3 dashboard-grid">
    <div class="col-sm-6 col-lg-4">
      <div class="card h-100 shadow-sm dashboard-card">
        <div class="card-body">
          <h2 class="h6">Manage Rooms</h2>
          <a class="btn btn-sm btn-primary" href="{% url 'room-list' %}">Open</a>
        </div>
      </div>
    </div>
  <div class="col-sm-6 col-lg-4">
    <div class="card h-100 shadow-sm dashboard-card">
      <div class="card-body">
        <h2 class="h6">Bookings</h2>
        <a class="btn btn-sm btn-primary" href="{% url 'booking-list' %}">Open</a>
      </div>
    </div>
  </div>
  <div class="col-sm-6 col-lg-4">
    <div class="card h-100 shadow-sm dashboard-card">
      <div class="card-body">
        <h2 class="h6">Event Space</h2>
        <a class="btn btn-sm btn-primary" href="{% url 'event-booking-list' %}">Open</a>
      </div>
    </div>
  </div>
  <div class="col-sm-6 col-lg-4">
    <div class="card h-100 shadow-sm dashboard-card">
      <div class="card-body">
        <h2 class="h6">HR Employees</h2>
        <a class="btn btn-sm btn-primary" href="{% url 'hr-list' %}">Open</a>
      </div>
    </div>
  </div>
  <div class="col-sm-6 col-lg-4">
    <div class="card h-100 shadow-sm dashboard-card">
      <div class="card-body">
        <h2 class="h6">Operations</h2>
        <a class="btn btn-sm btn-primary" href="{% url 'operations-overview' %}">Open</a>
      </div>
    </div>
  </div>
  <div class="col-sm-6 col-lg-4">
    <div class="card h-100 shadow-sm dashboard-card">
      <div class="card-body">
        <h2 class="h6">Shift Handover</h2>
        <a class="btn btn-sm btn-primary" href="{% url 'handover-list' %}">Open</a>
      </div>
    </div>
  </div>
  <div class="col-sm-6 col-lg-4">
    <div class="card h-100 shadow-sm dashboard-card">
      <div class="card-body">
        <h2 class="h6">Reports</h2>
        <a class="btn btn-sm btn-primary" href="{% url 'admin-reports' %}">Open</a>
      </div>
    </div>
  </div>
  <div class="col-sm-6 col-lg-4">
    <div class="card h-100 shadow-sm dashboard-card">
      <div class="card-body">
        <h2 class="h6">Users and Roles</h2>
        <a class="btn btn-sm btn-primary" href="/admin/auth/user/">Open</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
