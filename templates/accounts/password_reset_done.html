{% load static %}
<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Password Reset Sent - Fosua Guesthouse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/brand.css' %}" rel="stylesheet">
  </head>
  <body>
    <main class="container py-5">
      <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-md-6 col-lg-5">
          <div class="surface-panel overflow-hidden">
            <div class="brand-panel p-4 text-center">
              <img src="{% static 'branding/fosua-logo.jpg' %}" alt="Fosua Guesthouse logo" class="brand-wordmark mb-3">
              <div class="brand-gold-line"></div>
            </div>
            <div class="card-body p-4 p-lg-5 text-center">
              <div class="section-eyebrow mb-2">Check your inbox</div>
              <h1 class="page-title mb-2">Reset link sent</h1>
              <p class="page-subtitle mb-4">If the email exists in our system, you will receive a password reset link shortly.</p>
              <a class="btn btn-primary w-100" href="{% url 'login' %}">Back to login</a>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
