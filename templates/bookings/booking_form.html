{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="h4 mb-0">{{ title }}</h1>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-secondary" href="{% url 'guest-create' %}">New Guest</a>
        <a class="btn btn-outline-secondary" href="{% url 'room-availability' %}">Check Availability</a>
        <a class="btn btn-outline-secondary" href="{% url 'booking-list' %}">Back</a>
      </div>
    </div>
    <div class="card shadow-sm">
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          {{ form.non_field_errors }}
          <div class="row g-3">
            {% for field in form %}
              <div class="{% if field.name == 'notes' %}col-12{% else %}col-md-6{% endif %}">
                <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                  <div class="text-danger small mt-1">{{ field.errors|join:", " }}</div>
                {% endif %}
              </div>
            {% endfor %}
          </div>
          <div class="mt-4">
            <button class="btn btn-primary" type="submit">Save Booking</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
