{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="dashboard-background p-4 rounded-4 shadow-sm">
  <div class="brand-panel p-4 mb-4">
    <h1 class="h4 mb-1">Delete employee</h1>
    <div class="brand-gold-line"></div>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body p-4">
      <p>Are you sure you want to delete <strong>{{ employee.first_name }} {{ employee.last_name }}</strong>?</p>
      <form method="post">
        {% csrf_token %}
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-danger">Yes, delete</button>
          <a class="btn btn-outline-secondary" href="{% url 'hr-list' %}">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
