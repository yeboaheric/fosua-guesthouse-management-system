{% if widget.is_initial and widget.value.url %}
  <div class="mb-2">
    <img
      src="{{ widget.value.url }}"
      alt="Current employee photo"
      class="employee-portrait"
      style="max-width: 160px; max-height: 160px; object-fit: cover;"
    >
  </div>
  {% if not widget.required %}
    <div class="form-check mb-2">
      <input
        class="form-check-input"
        type="checkbox"
        name="{{ widget.checkbox_name }}"
        id="{{ widget.checkbox_id }}"
        {% if widget.attrs.disabled %}disabled{% endif %}
      >
      <label class="form-check-label" for="{{ widget.checkbox_id }}">
        Remove current photo
      </label>
    </div>
  {% endif %}
{% endif %}
<input
  type="{{ widget.type }}"
  name="{{ widget.name }}"
  {% include "django/forms/widgets/attrs.html" %}
>
