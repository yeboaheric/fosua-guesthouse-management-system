services:
  - type: web
    name: fosua-guesthouse-web
    runtime: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "./scripts/start-cloud.sh"
    autoDeploy: true
    healthCheckPath: /healthz/
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: fosua-guesthouse-db
          property: connectionString
      - key: DB_SSL_REQUIRE
        value: "True"
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        sync: false

databases:
  - name: fosua-guesthouse-db
    plan: starter
