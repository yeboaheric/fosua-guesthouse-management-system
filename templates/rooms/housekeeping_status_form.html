{% extends "base.html" %}

{% block content %}
<div class="surface-panel p-4">
  <h1 class="h5 mb-3">Update housekeeping status</h1>
  <form method="post">
    {% csrf_token %}
    <div class="row g-3">
      <div class="col-md-6">{{ form.room.label_tag }}{{ form.room }}</div>
      <div class="col-md-6">{{ form.new_status.label_tag }}{{ form.new_status }}</div>
      <div class="col-12">{{ form.notes.label_tag }}{{ form.notes }}</div>
    </div>
    <div class="mt-3">
      <button class="btn btn-primary">Save</button>
      <a class="btn btn-outline-secondary" href="{% url 'housekeeping-dashboard' %}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
